<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netlify Form Helper</title>
</head>
<body>
    <form name="project-intake" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input type="text" name="clientName" />
        <input type="email" name="clientEmail" />
        <input type="file" name="blueprints" />
        <textarea name="projectDescription"></textarea>
        <input type="text" name="bot-field" />
    </form>
</body>
</html>
